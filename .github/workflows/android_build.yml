name: Android CI/CD - Build APK

# 设置触发条件：当代码推送到 main 分支，或者手动触发
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 允许在 GitHub 页面手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest # 使用 GitHub 提供的最新 Ubuntu 虚拟机

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 # 拉取仓库代码

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle # 开启 Gradle 缓存，加快后续编译速度

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug # 编译 Debug 版 APK，无需签名即可安装

    # 编译完成后，将 APK 上传到 GitHub Actions 的 Artifacts 栏目
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: UnlockLogger-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk

    # (可选) 如果你打了 Tag，可以自动创建一个 Release 并发布 APK
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
